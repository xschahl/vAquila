  #   environment:
  #     - VAQ_HF_CACHE_HOST_PATH=${VAQ_HF_CACHE_HOST_PATH:-~/.cache/huggingface}
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - NVIDIA_DRIVER_CAPABILITIES=compute,utility
